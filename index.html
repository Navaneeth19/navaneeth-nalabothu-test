<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navaneeth Nalabothu | Legal Vanguard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- GSAP (Must load before local JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-content">
            <div class="gavel-icon">⚖️</div>
            <div class="loader-text">INITIALIZING JUSTICE...</div>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>
    </div>

    <!-- Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Background -->
    <canvas id="bg-canvas"></canvas>
    <div class="noise-overlay"></div>

    <!-- Main Content -->
    <main class="container">
        <header>
            <div class="logo">NN<span>.</span></div>
            <nav>
                <button id="theme-toggle" class="btn-glass hover-target">
                    <span class="icon">◑</span>
                    <span class="label">Theme</span>
                </button>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-badge">
                <span class="dot"></span> PORTFOLIO COMING SOON
            </div>
            
            <div class="title-wrapper">
                <h1 class="line-1">Navaneeth</h1>
                <h1 class="line-2">Nalabothu</h1>
            </div>

            <p class="subtitle">
                Design. Motion. <span class="highlight">Law.</span><br>
                Where creativity meets the gavel.
            </p>

            <div class="cta-group">
                <button class="btn-primary hover-target">Notify Me</button>
                <button class="btn-secondary hover-target">View Resume</button>
            </div>
        </section>

        <footer>
            <div class="socials">
                <a href="#" class="social-link hover-target">LN</a>
                <a href="#" class="social-link hover-target">TW</a>
                <a href="#" class="social-link hover-target">IG</a>
            </div>
            <div class="copyright">© 2024 Legal Vanguard</div>
        </footer>
    </main>

    <!-- Scripts (Order Matters) -->
    <script src="./js/audio.js"></script>
    <script src="./js/particles.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
