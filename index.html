<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navaneeth Nalabothu — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050508;
      --surface: #0d0d14;
      --fg: #f0eee8;
      --muted: #6a6880;
      --accent: #e8ff57;
      --accent2: #ff5757;
      --accent3: #57b8ff;
      --grid: rgba(255,255,255,0.03);
      --glow: rgba(232,255,87,0.18);
      --border: rgba(255,255,255,0.07);
      --card: rgba(255,255,255,0.03);
      --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    [data-theme="light"] {
      --bg: #f5f3ee;
      --surface: #eceae3;
      --fg: #0a0a10;
      --muted: #8a8898;
      --accent: #1a1aff;
      --accent2: #ff2d2d;
      --accent3: #0066cc;
      --grid: rgba(0,0,0,0.04);
      --glow: rgba(26,26,255,0.1);
      --border: rgba(0,0,0,0.08);
      --card: rgba(0,0,0,0.03);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
      transition: background var(--transition), color var(--transition);
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
    }
    .cursor-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.15s, width 0.3s, height 0.3s, opacity 0.3s;
      opacity: 0.6;
    }
    body:has(a:hover) .cursor-ring,
    body:has(button:hover) .cursor-ring { width: 56px; height: 56px; opacity: 1; }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: var(--noise);
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* ── GRID BACKGROUND ── */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      animation: gridPan 40s linear infinite;
    }
    @keyframes gridPan {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 60px 60px, 60px 60px; }
    }

    /* ── FLOATING ORBS ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat linear infinite;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,255,87,0.12), transparent 70%);
      top: -200px; left: -200px;
      animation-duration: 25s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,87,87,0.1), transparent 70%);
      bottom: -150px; right: -150px;
      animation-duration: 30s;
      animation-direction: reverse;
    }
    .orb-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(87,184,255,0.08), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 20s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 50px) scale(0.95); }
      75% { transform: translate(-50px, -20px) scale(1.02); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 28px; right: 28px;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 18px;
      cursor: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
    }
    .theme-toggle:hover { color: var(--fg); border-color: var(--accent); }
    .theme-toggle .icon { font-size: 14px; transition: transform 0.5s; }
    .theme-toggle:hover .icon { transform: rotate(180deg); }

    /* ── NAV STRIP ── */
    .nav-strip {
      position: fixed;
      top: 28px; left: 28px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28ca41; }

    /* ── MAIN CONTENT ── */
    .main {
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 40px; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .name-block {
      overflow: hidden;
      margin-bottom: 8px;
    }
    .name-first {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 14vw, 160px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--fg);
      display: block;
      opacity: 0;
      transform: translateY(60px);
      animation: slideUp 0.9s 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .name-last {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(60px, 11vw, 128px);
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--accent);
      display: block;
      opacity: 0;
      transform: translateY(60px);
      animation: slideUp 0.9s 0.55s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      -webkit-text-stroke: 1px var(--accent);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(11px, 1.5vw, 14px);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 32px auto;
      max-width: 460px;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }

    /* ── COUNTDOWN ── */
    .countdown-wrap {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 48px auto;
      opacity: 0;
      animation: fadeUp 0.8s 1s forwards;
      flex-wrap: wrap;
    }
    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 80px;
    }
    .cd-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      line-height: 1;
      color: var(--fg);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      min-width: 90px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }
    .cd-number::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.15) 100%);
      pointer-events: none;
    }
    .cd-number.flip {
      animation: flip 0.4s ease;
    }
    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(-90deg); color: var(--accent); }
      100% { transform: rotateX(0deg); }
    }
    .cd-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .cd-sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--accent);
      align-self: flex-start;
      padding-top: 12px;
      opacity: 0.5;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.1; } }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s forwards;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 10px;
      width: 0%;
      animation: fillBar 2s 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }
    @keyframes fillBar {
      to { width: 67%; }
    }



    /* ── FLOATING TAGS ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 40px auto 0;
      max-width: 600px;
      opacity: 0;
      animation: fadeUp 0.8s 1.3s forwards;
    }
    .tag {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 7px 16px;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      background: var(--card);
    }
    .tag:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--glow);
    }

    /* ── TICKER ── */
    .ticker {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--accent);
      color: #0a0a10;
      padding: 8px 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.2em;
      overflow: hidden;
      z-index: 100;
    }
    .ticker-inner {
      display: flex;
      white-space: nowrap;
      animation: ticker 30s linear infinite;
    }
    .ticker-item { padding: 0 40px; }
    .ticker-sep { opacity: 0.4; }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── SCANLINES ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── CORNER DECO ── */
    .corner { position: fixed; z-index: 5; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-br { bottom: 50px; right: 20px; }
    .corner svg { width: 30px; height: 30px; opacity: 0.2; }

    /* ── PARTICLES ── */
    canvas#particles {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .countdown-wrap { gap: 8px; }
      .cd-number { min-width: 65px; padding: 10px 14px; font-size: 40px; }
      .cd-sep { font-size: 32px; }
      .nav-strip { display: none; }
      .theme-toggle { top: 16px; right: 16px; }
    }
  </style>
</head>
<body>

<!-- Cursor -->
<div class="cursor cursor-dot" id="cursorDot"></div>
<div class="cursor cursor-ring" id="cursorRing"></div>

<!-- Particles -->
<canvas id="particles"></canvas>

<!-- Grid + Orbs -->
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Nav Dots -->
<div class="nav-strip">
  <div class="dot dot-r"></div>
  <div class="dot dot-y"></div>
  <div class="dot dot-g"></div>
</div>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">
  <span class="icon" id="themeIcon">☀</span>
  <span id="themeLabel">Day</span>
</button>

<!-- Corners -->
<div class="corner corner-tl">
  <svg viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M0 30 L0 0 L30 0"/>
  </svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 30 30" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M30 0 L30 30 L0 30"/>
  </svg>
</div>

<!-- Main -->
<div class="wrapper">
  <main class="main">

    <p class="eyebrow">Portfolio — Coming Soon</p>

    <div class="name-block">
      <span class="name-first">Navaneeth</span>
      <span class="name-last">Nalabothu</span>
    </div>

    <p class="tagline">Design. Motion. Law.<br>A unique portfolio at the intersection of creativity & justice.</p>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <div class="cd-unit">
        <div class="cd-number" id="cd-days">00</div>
        <div class="cd-label">Days</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-number" id="cd-hours">00</div>
        <div class="cd-label">Hours</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-number" id="cd-mins">00</div>
        <div class="cd-label">Minutes</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-number" id="cd-secs">00</div>
        <div class="cd-label">Seconds</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>BUILD PROGRESS</span>
        <span>67%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- Tags -->
    <div class="tags">
      <span class="tag">UI / UX Design</span>
      <span class="tag">Motion Design</span>
      <span class="tag">Law</span>
      <span class="tag">Legal Tech</span>
      <span class="tag">Open to Work</span>
    </div>

  </main>
</div>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<script>
  // ── THEME TOGGLE
  let isDark = true;
  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('themeIcon').textContent = isDark ? '☀' : '☾';
    document.getElementById('themeLabel').textContent = isDark ? 'Day' : 'Night';
  }

  // ── CUSTOM CURSOR
  const dot = document.getElementById('cursorDot');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animateCursor() {
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // ── COUNTDOWN (target: 90 days from now)
  const target = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000);
  const els = {
    days: document.getElementById('cd-days'),
    hours: document.getElementById('cd-hours'),
    mins: document.getElementById('cd-mins'),
    secs: document.getElementById('cd-secs'),
  };
  const prev = { days: -1, hours: -1, mins: -1, secs: -1 };
  function updateCountdown() {
    const diff = target - Date.now();
    if (diff <= 0) return;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const update = (key, val) => {
      const str = String(val).padStart(2, '0');
      if (val !== prev[key]) {
        els[key].textContent = str;
        els[key].classList.remove('flip');
        void els[key].offsetWidth;
        els[key].classList.add('flip');
        prev[key] = val;
      }
    };
    update('days', d); update('hours', h); update('mins', m); update('secs', s);
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // ── TICKER
  const words = ['Navaneeth Nalabothu', '★', 'UI / UX Design', '◆', 'Motion Design', '★', 'Law', '◆', 'Legal Tech', '★', 'Coming Soon', '◆', 'Open to Work', '★'];
  const html = words.map((w, i) => `<span class="ticker-item${w === '★' || w === '◆' ? ' ticker-sep' : ''}">${w}</span>`).join('');
  const ti = document.getElementById('tickerInner');
  ti.innerHTML = html + html; // double for infinite scroll

  // ── PARTICLES
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.alpha = Math.random() * 0.5 + 0.1;
      this.life = Math.random() * 200 + 100;
      this.age = 0;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY; this.age++;
      if (this.age > this.life || this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      const fade = this.age < 20 ? this.age / 20 : this.age > this.life - 20 ? (this.life - this.age) / 20 : 1;
      ctx.globalAlpha = this.alpha * fade;
      const isDarkTheme = document.documentElement.getAttribute('data-theme') !== 'light';
      ctx.fillStyle = isDarkTheme ? '#e8ff57' : '#1a1aff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (let i = 0; i < 120; i++) particles.push(new Particle());

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    // draw connecting lines
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          const isDarkTheme = document.documentElement.getAttribute('data-theme') !== 'light';
          ctx.globalAlpha = (1 - dist / 100) * 0.08;
          ctx.strokeStyle = isDarkTheme ? '#e8ff57' : '#1a1aff';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // ── MAGNETIC EFFECT ON NAME
  document.querySelectorAll('.name-first, .name-last').forEach(el => {
    document.addEventListener('mousemove', e => {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / window.innerWidth;
      const dy = (e.clientY - cy) / window.innerHeight;
      el.style.transform = `translate(${dx * 12}px, ${dy * 8}px)`;
    });
  });
</script>
</body>
</html>
